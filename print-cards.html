<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Undercover — Cartes imprimables</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f5;color:#1a1a2e;padding:2rem}
  h1{text-align:center;font-size:1.6rem;margin-bottom:.3rem}
  .sub{text-align:center;color:#888;font-size:.85rem;margin-bottom:1.5rem}

  /* Controls */
  .controls{max-width:600px;margin:0 auto 2rem;background:#fff;border-radius:16px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.08)}
  .crow{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem}
  .crow:last-child{margin-bottom:0}
  label{font-weight:600;font-size:.9rem}
  select,input[type=number]{padding:.45rem .7rem;border:1.5px solid #ddd;border-radius:8px;font-size:.9rem;background:#fafafa}
  select{min-width:180px}
  input[type=number]{width:70px;text-align:center}
  .print-btn{display:block;margin:1.5rem auto 0;padding:.75rem 2.5rem;border:none;border-radius:12px;background:#6c5ce7;color:#fff;font-size:1rem;font-weight:700;cursor:pointer}
  .print-btn:hover{background:#5a4bd1}

  /* Card grid */
  .page{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:2rem}

  .card{width:220px;height:140px;border-radius:14px;border:2.5px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;background:#fff;page-break-inside:avoid}
  .card .logo{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:800;color:#fff;margin-bottom:.4rem}
  .card .role{font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:.15rem}
  .card .word{font-size:1.15rem;font-weight:800;text-align:center;padding:0 .5rem}
  .card .group-tag{position:absolute;top:8px;right:10px;font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:6px;color:#fff}
  .card .card-num{position:absolute;top:8px;left:10px;font-size:.6rem;font-weight:600;color:#aaa}

  /* Back cards (to print on reverse) */
  .back-page{margin-top:1rem}
  .back-page .card{background:var(--group-color);border-color:var(--group-color)}
  .back-page .card .logo{background:rgba(255,255,255,.3);font-size:1.4rem}
  .back-page .card .word{color:#fff;font-size:1.1rem;font-weight:700}

  /* Print */
  @media print{
    body{background:#fff;padding:0}
    .controls,.print-btn,.sub,h1{display:none!important}
    .page{gap:4px;margin:0;padding:10px}
    .card{width:48mm;height:32mm;border-width:1.5px;border-radius:8px}
    .card .logo{width:28px;height:28px;font-size:.9rem}
    .card .word{font-size:.95rem}
    .back-page{page-break-before:always}
  }
</style>
</head>
<body>

<h1>Undercover — Cartes</h1>
<p class="sub">Imprime recto (mots) puis verso (dos coloré) pour ne pas mélanger les groupes</p>

<div class="controls">
  <div class="crow">
    <label>Paire de mots</label>
    <select id="pairSel"></select>
  </div>
  <div class="crow">
    <label>Nombre de groupes</label>
    <input type="number" id="numGroups" value="1" min="1" max="10">
  </div>
  <div class="crow">
    <label>Joueurs par groupe</label>
    <input type="number" id="numPlayers" value="8" min="4" max="12">
  </div>
  <div class="crow">
    <label>Undercovers par groupe</label>
    <input type="number" id="numUc" value="1" min="1" max="3">
  </div>
  <button class="print-btn" onclick="generate()">Générer les cartes</button>
  <button class="print-btn" style="background:#333;margin-top:.5rem" onclick="window.print()">Imprimer / PDF</button>
</div>

<div id="output"></div>

<script>
const GROUP_COLORS=['#6c5ce7','#e17055','#00b894','#0984e3','#fdcb6e','#e84393','#00cec9','#d63031','#a29bfe','#55efc4'];
const GROUP_ICONS=['U','U','U','U','U','U','U','U','U','U'];
let PAIRS=[];

async function loadWords(){
  try{const r=await fetch('./words.json');PAIRS=await r.json();}
  catch(e){PAIRS=[{civ:'Pizza',spy:'Burger',cat:'Nourriture'}];}
  const sel=document.getElementById('pairSel');
  PAIRS.forEach((p,i)=>{
    const o=document.createElement('option');
    o.value=i;
    o.textContent=`${p.civ} vs ${p.spy} (${p.cat||''})`;
    sel.appendChild(o);
  });
  // Random default
  sel.value=Math.floor(Math.random()*PAIRS.length);
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function generate(){
  const pairIdx=+document.getElementById('pairSel').value;
  const nGroups=+document.getElementById('numGroups').value;
  const nPlayers=+document.getElementById('numPlayers').value;
  const nUc=+document.getElementById('numUc').value;
  const pair=PAIRS[pairIdx];
  const out=document.getElementById('output');
  out.innerHTML='';

  for(let g=0;g<nGroups;g++){
    const color=GROUP_COLORS[g%GROUP_COLORS.length];
    // Build roles
    const roles=[];
    for(let i=0;i<nUc;i++) roles.push({role:'Undercover',word:pair.spy});
    for(let i=nUc;i<nPlayers;i++) roles.push({role:'Civil',word:pair.civ});
    const shuffled=shuffle(roles);

    // FRONT: word cards
    const frontDiv=document.createElement('div');
    frontDiv.className='page';
    frontDiv.innerHTML=`<div style="width:100%;text-align:center;font-weight:700;font-size:1rem;margin-bottom:.3rem;color:${color}">Groupe ${g+1}</div>`;
    shuffled.forEach((c,i)=>{
      const isSpy=c.role==='Undercover';
      frontDiv.innerHTML+=`
        <div class="card" style="border-color:${color}">
          <div class="card-num">#${i+1}</div>
          <div class="group-tag" style="background:${color}">G${g+1}</div>
          <div class="logo" style="background:${isSpy?'#e17055':'#6c5ce7'}">${isSpy?'M':'C'}</div>
          <div class="role" style="color:${isSpy?'#e17055':'#6c5ce7'}">${c.role}</div>
          <div class="word">${c.word}</div>
        </div>`;
    });
    out.appendChild(frontDiv);

    // BACK: colored back for reverse printing
    const backDiv=document.createElement('div');
    backDiv.className='page back-page';
    backDiv.style.setProperty('--group-color',color);
    backDiv.innerHTML=`<div style="width:100%;text-align:center;font-weight:700;font-size:1rem;margin-bottom:.3rem;color:${color}">Groupe ${g+1} — DOS (imprimer au verso)</div>`;
    // Reverse order for double-sided printing
    for(let i=shuffled.length-1;i>=0;i--){
      backDiv.innerHTML+=`
        <div class="card">
          <div class="logo">?</div>
          <div class="word">UNDERCOVER</div>
        </div>`;
    }
    out.appendChild(backDiv);
  }
}

loadWords();
</script>
</body>
</html>
